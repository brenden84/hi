<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body { margin: 0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>Flappy Bird Game with CORS Proxy</h1>
    <script>
        let proxyUrl = 'https://your-cors-proxy-url.com/'; // Replace with your CORS Proxy URL
        let iframe;

        document.addEventListener('keydown', function(event) {
            if (event.key === '=') {
                const url = prompt('Enter URL to display:');
                if (url) {
                    fetch(proxyUrl + url)
                        .then(response => response.text())
                        .then(data => {
                            if (!iframe) {
                                iframe = document.createElement('iframe');
                                document.body.appendChild(iframe);
                            }
                            iframe.srcdoc = data;
                        })
                        .catch(err => console.error('Error fetching URL:', err)); 
                }
            }
        });
    </script>
</body>
</html>
